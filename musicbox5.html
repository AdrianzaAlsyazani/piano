<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Piano - Director's Cut</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #ddeffb; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #4a4a4a;
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px);
            padding: 20px; border-radius: 15px; z-index: 10;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.3);
            width: 250px;
        }
        .cam-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        button {
            background: #a8dadc; border: none; padding: 10px;
            color: #457b9d; cursor: pointer; font-weight: bold; 
            border-radius: 6px; width: 100%; transition: 0.2s; font-size: 0.8rem;
        }
        button:hover { background: #457b9d; color: white; }
        button.active { background: #1d3557; color: white; }
        .play-btn { background: #457b9d; color: white; margin-top: 15px; padding: 15px; font-size: 1rem; }
        #status { font-size: 0.75rem; margin-top: 10px; color: #666; text-align: center; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0 0 10px 0; font-weight:300;">Heavenly Piano</h2>
        <input type="file" id="midi-upload" accept=".mid,.midi" style="width:100%; font-size:0.7rem; margin-bottom:10px;">
        
        <label style="font-size: 0.8rem; color: #555;">Kamera Mode:</label>
        <div class="cam-controls">
            <button onclick="setCam('free')" id="btn-free" class="active">Free</button>
            <button onclick="setCam('cinematic')" id="btn-cine">Auto</button>
            <button onclick="setCam('top')" id="btn-top">Top</button>
            <button onclick="setCam('side')" id="btn-side">Side</button>
        </div>

        <button id="start-btn" class="play-btn">START RECITAL</button>
        <div id="status">Siap memainkan melodi...</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "tone": "https://esm.sh/tone",
                "@tonejs/midi": "https://esm.sh/@tonejs/midi",
                "@tweenjs/tween.js": "https://esm.sh/@tweenjs/tween.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import * as TWEEN from '@tweenjs/tween.js';
        import * as Tone from 'tone';
        import { Midi } from '@tonejs/midi';

        // --- 1. SETUP DASAR ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xddeffb);
        scene.fog = new THREE.Fog(0xddeffb, 20, 100);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 12, 25);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const light = new THREE.HemisphereLight(0xffffff, 0x457b9d, 1.5);
        scene.add(light);

        // --- 2. LANTAI REFLEKTIF ---
        const floor = new THREE.Mesh(
            new THREE.CircleGeometry(40, 64),
            new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.05, metalness: 0.3, transparent: true, opacity: 0.5 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.6;
        scene.add(floor);

        // --- 3. TUTS PIANO (Perfect Spacing) ---
        const keys = [];
        const keyGroup = new THREE.Group();
        const pattern = [false, true, false, true, false, false, true, false, true, false, true, false];
        let whiteKeyCount = 0;
        const spacing = 0.52;

        for (let i = 0; i < 88; i++) {
            const isBlack = pattern[i % 12];
            const mesh = new THREE.Mesh(
                isBlack ? new THREE.BoxGeometry(0.28, 0.45, 1.8) : new THREE.BoxGeometry(0.48, 0.35, 3.2),
                new THREE.MeshStandardMaterial({ color: isBlack ? 0x1d3557 : 0xffffff, emissive: new THREE.Color(0x000000) })
            );
            if (isBlack) mesh.position.set((whiteKeyCount - 0.5) * spacing, 0.25, -0.75);
            else { mesh.position.set(whiteKeyCount * spacing, 0, 0); whiteKeyCount++; }
            keyGroup.add(mesh);
            keys.push({ mesh, originalY: mesh.position.y });
        }
        keyGroup.position.x = -(whiteKeyCount * spacing) / 2;
        scene.add(keyGroup);

        // --- 4. SISTEM PARTIKEL BERSIH ---
        function spawnParticle(x, z, color) {
            const p = new THREE.Mesh(
                new THREE.SphereGeometry(0.12, 8, 8),
                new THREE.MeshBasicMaterial({ color: color, transparent: true })
            );
            p.position.set(x, 0.5, z);
            scene.add(p);

            new TWEEN.Tween(p.position)
                .to({ y: 8 + Math.random() * 4, x: x + (Math.random() - 0.5) * 4 }, 2000)
                .easing(TWEEN.Easing.Quadratic.Out)
                .onComplete(() => {
                    scene.remove(p); // MENGHAPUS DARI MEMORI
                    p.geometry.dispose();
                    p.material.dispose();
                }).start();

            new TWEEN.Tween(p.material).to({ opacity: 0 }, 2000).start();
        }

        // --- 5. KAMERA LOGIC ---
        window.camMode = 'free';
        window.setCam = (mode) => {
            window.camMode = mode;
            document.querySelectorAll('.cam-controls button').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');
            
            controls.enabled = (mode === 'free');
            if (mode === 'top') {
                new TWEEN.Tween(camera.position).to({ x: 0, y: 25, z: 2 }, 1000).easing(TWEEN.Easing.Quadratic.InOut).start();
            } else if (mode === 'side') {
                new TWEEN.Tween(camera.position).to({ x: -28, y: 5, z: 5 }, 1000).easing(TWEEN.Easing.Quadratic.InOut).start();
            }
        };

        // --- 6. AUDIO & MIDI ---
        const sampler = new Tone.Sampler({
            urls: { "C4": "C4.mp3", "A0": "A0.mp3", "C5": "C5.mp3" },
            baseUrl: "https://tonejs.github.io/audio/salamander/",
        }).toDestination();

        const startBtn = document.getElementById('start-btn');
        let midi = null;

        document.getElementById('midi-upload').addEventListener('change', async (e) => {
            const buffer = await e.target.files[0].arrayBuffer();
            midi = new Midi(buffer);
            document.getElementById('status').innerText = "Melodi siap!";
        });

        startBtn.addEventListener('click', async () => {
            if (!midi) return;
            await Tone.start();
            const now = Tone.now() + 0.5;
            midi.tracks.forEach(track => {
                track.notes.forEach(note => {
                    sampler.triggerAttackRelease(note.name, note.duration, note.time + now, note.velocity);
                    Tone.Draw.schedule(() => {
                        const key = keys[note.midi - 21];
                        if (key) {
                            const glow = new THREE.Color(0xa8dadc).multiplyScalar(note.velocity + 0.5);
                            const worldPos = new THREE.Vector3();
                            key.mesh.getWorldPosition(worldPos);
                            spawnParticle(worldPos.x, worldPos.z, glow);

                            new TWEEN.Tween(key.mesh.position).to({ y: key.originalY - 0.2 }, 80).easing(TWEEN.Easing.Cubic.Out).start();
                            key.mesh.material.emissive.set(glow);

                            setTimeout(() => {
                                new TWEEN.Tween(key.mesh.position).to({ y: key.originalY }, 200).start();
                                key.mesh.material.emissive.setHex(0x000000);
                            }, note.duration * 1000);
                        }
                    }, note.time + now);
                });
            });
        });

        // --- 7. ANIMATE ---
        let angle = 0;
        function animate() {
            requestAnimationFrame(animate);
            TWEEN.update();
            
            if (window.camMode === 'cinematic') {
                angle += 0.003;
                camera.position.x = Math.sin(angle) * 30;
                camera.position.z = Math.cos(angle) * 30;
                camera.position.y = 12 + Math.sin(angle * 0.5) * 5;
                camera.lookAt(0, 0, 0);
            }

            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
