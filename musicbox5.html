<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Piano Fixed - Dreamy Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #ddeffb; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #1d3557;
            background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(10px);
            padding: 20px; border-radius: 15px; z-index: 10; border: 1px solid rgba(255,255,255,0.3);
        }
        button {
            background: #457b9d; border: none; padding: 12px;
            color: white; cursor: pointer; font-weight: bold; 
            border-radius: 8px; width: 100%; transition: 0.3s;
        }
        button:hover { background: #1d3557; }
        #status { font-size: 0.8rem; margin-top: 10px; color: #457b9d; }
    </style>
</head>
<body>

    <div id="ui">
        <h2>Atmospheric Piano v2</h2>
        <input type="file" id="midi-upload" accept=".mid,.midi">
        <button id="start-btn">PLAY MUSIC</button>
        <div id="status">Menunggu file MIDI...</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "tone": "https://esm.sh/tone",
                "@tonejs/midi": "https://esm.sh/@tonejs/midi",
                "@tweenjs/tween.js": "https://esm.sh/@tweenjs/tween.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import * as TWEEN from '@tweenjs/tween.js';
        import * as Tone from 'tone';
        import { Midi } from '@tonejs/midi';

        // --- 1. SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xddeffb);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        const ambient = new THREE.HemisphereLight(0xffffff, 0x457b9d, 1);
        scene.add(ambient);

        // --- 2. WATER FLOOR ---
        const floor = new THREE.Mesh(
            new THREE.CircleGeometry(25, 64),
            new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1, metalness: 0.5, transparent: true, opacity: 0.7 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.6;
        scene.add(floor);

        // --- 3. PIANO KEYS ---
        const keys = [];
        const keyGroup = new THREE.Group();
        const pattern = [false, true, false, true, false, false, true, false, true, false, true, false];
        
        for (let i = 0; i < 88; i++) {
            const isBlack = pattern[i % 12];
            const mesh = new THREE.Mesh(
                isBlack ? new THREE.BoxGeometry(0.28, 0.4, 1.8) : new THREE.BoxGeometry(0.48, 0.3, 3),
                new THREE.MeshStandardMaterial({ color: isBlack ? 0x1d3557 : 0xffffff, emissive: new THREE.Color(0x000000) })
            );
            
            const xPos = i * 0.32; // Penempatan sederhana untuk tes
            mesh.position.set(xPos, isBlack ? 0.2 : 0, isBlack ? -0.6 : 0);
            
            keyGroup.add(mesh);
            keys.push({ mesh, originalY: mesh.position.y, tweens: [] });
        }
        keyGroup.position.x = -14;
        scene.add(keyGroup);

        // --- 4. AUDIO ---
        const sampler = new Tone.Sampler({
            urls: { "C4": "C4.mp3" },
            baseUrl: "https://tonejs.github.io/audio/salamander/",
        }).toDestination();

        // --- 5. FIXED ANIMATION LOGIC ---
        function animateKey(idx, duration, velocity) {
            const key = keys[idx];
            if (!key) return;

            // 1. Hentikan semua animasi yang sedang berjalan pada tuts ini
            key.tweens.forEach(t => t.stop());
            key.tweens = [];

            // 2. Animasi Tekan
            const down = new TWEEN.Tween(key.mesh.position)
                .to({ y: key.originalY - 0.2 }, 50)
                .easing(TWEEN.Easing.Cubic.Out);

            const glowOn = new TWEEN.Tween(key.mesh.material.emissive)
                .to({ r: 0.2, g: 0.6, b: 0.8 }, 50);

            // 3. Animasi Lepas (Glow harus hilang di sini)
            const up = new TWEEN.Tween(key.mesh.position)
                .to({ y: key.originalY }, 200)
                .easing(TWEEN.Easing.Quadratic.In)
                .delay(duration * 1000);

            const glowOff = new TWEEN.Tween(key.mesh.material.emissive)
                .to({ r: 0, g: 0, b: 0 }, 300)
                .delay(duration * 1000);

            // Simpan referensi tween agar bisa di-stop jika nada yang sama ditekan cepat
            key.tweens.push(down, glowOn, up, glowOff);

            down.start();
            glowOn.start();
            up.start();
            glowOff.start();
        }

        // --- 6. HANDLERS ---
        const startBtn = document.getElementById('start-btn');
        const upload = document.getElementById('midi-upload');
        let midi = null;

        upload.addEventListener('change', async (e) => {
            const arrayBuffer = await e.target.files[0].arrayBuffer();
            midi = new Midi(arrayBuffer);
            document.getElementById('status').innerText = "Ready!";
        });

        startBtn.addEventListener('click', async () => {
            if (!midi) return;
            await Tone.start();
            const now = Tone.now() + 0.5;
            midi.tracks.forEach(track => {
                track.notes.forEach(note => {
                    sampler.triggerAttackRelease(note.name, note.duration, note.time + now, note.velocity);
                    Tone.Draw.schedule(() => {
                        animateKey(note.midi - 21, note.duration, note.velocity);
                    }, note.time + now);
                });
            });
        });

        function animate() {
            requestAnimationFrame(animate);
            TWEEN.update(); // Ini kunci agar animasi bergerak dan berakhir
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
