<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Piano - Perfect Spacing Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #ddeffb; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #4a4a4a;
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px);
            padding: 20px; border-radius: 15px; z-index: 10;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.3);
        }
        h2 { margin: 0 0 10px 0; font-weight: 300; letter-spacing: 1px; }
        button {
            background: #a8dadc; border: none; padding: 12px;
            color: #457b9d; cursor: pointer; font-weight: bold; 
            border-radius: 8px; width: 100%; transition: 0.3s;
        }
        button:hover { background: #457b9d; color: white; }
        #status { font-size: 0.8rem; margin-top: 10px; color: #777; }
    </style>
</head>
<body>

    <div id="ui">
        <h2>Heavenly Piano</h2>
        <input type="file" id="midi-upload" accept=".mid,.midi">
        <button id="start-btn">PLAY MELODY</button>
        <div id="status">Pilih melodi fajar...</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "tone": "https://esm.sh/tone",
                "@tonejs/midi": "https://esm.sh/@tonejs/midi",
                "@tweenjs/tween.js": "https://esm.sh/@tweenjs/tween.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import * as TWEEN from '@tweenjs/tween.js';
        import * as Tone from 'tone';
        import { Midi } from '@tonejs/midi';

        // --- 1. SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xddeffb); 
        scene.fog = new THREE.Fog(0xddeffb, 15, 60);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x8d99ae, 1.2);
        scene.add(hemiLight);

        // --- 2. MIRROR FLOOR (Reflektif) ---
        const floor = new THREE.Mesh(
            new THREE.CircleGeometry(30, 64),
            new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.05, metalness: 0.4, transparent: true, opacity: 0.6 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.6;
        scene.add(floor);

        // --- 3. PIANO KEYS (Fixed Spacing Logic) ---
        const keys = [];
        const keyGroup = new THREE.Group();
        const pattern = [false, true, false, true, false, false, true, false, true, false, true, false];
        
        let whiteKeyCount = 0;
        const spacing = 0.52; // Kunci jarak antar tuts agar akurat

        for (let i = 0; i < 88; i++) {
            const isBlack = pattern[i % 12];
            const geometry = isBlack ? new THREE.BoxGeometry(0.28, 0.4, 1.8) : new THREE.BoxGeometry(0.48, 0.3, 3.2);
            const material = new THREE.MeshStandardMaterial({ 
                color: isBlack ? 0x2b2d42 : 0xffffff,
                emissive: new THREE.Color(0x000000)
            });
            
            const mesh = new THREE.Mesh(geometry, material);
            
            if (isBlack) {
                // Menaruh tuts hitam di antara tuts putih
                mesh.position.set((whiteKeyCount - 0.5) * spacing, 0.2, -0.7);
            } else {
                mesh.position.set(whiteKeyCount * spacing, 0, 0);
                whiteKeyCount++;
            }
            
            keyGroup.add(mesh);
            keys.push({ mesh, originalY: mesh.position.y });
        }
        keyGroup.position.x = -(whiteKeyCount * spacing) / 2;
        scene.add(keyGroup);

        // --- 4. PARTICLE SYSTEM ---
        function createParticle(x, z, color) {
            const p = new THREE.Mesh(
                new THREE.SphereGeometry(0.1, 8, 8),
                new THREE.MeshBasicMaterial({ color: color, transparent: true })
            );
            p.position.set(x, 0.5, z);
            scene.add(p);

            new TWEEN.Tween(p.position)
                .to({ y: 8 + Math.random() * 4, x: x + (Math.random() - 0.5) * 3 }, 2500)
                .easing(TWEEN.Easing.Quadratic.Out)
                .onComplete(() => scene.remove(p))
                .start();

            new TWEEN.Tween(p.material).to({ opacity: 0 }, 2500).start();
        }

        // --- 5. AUDIO & ANIMATION ---
        const sampler = new Tone.Sampler({
            urls: { "C4": "C4.mp3", "A0": "A0.mp3", "A1": "A1.mp3" },
            baseUrl: "https://tonejs.github.io/audio/salamander/",
        }).toDestination();

        let isPlaying = false;

        function animateKey(idx, duration, velocity) {
            const key = keys[idx];
            if (!key) return;

            const glowColor = new THREE.Color(0xa8dadc).multiplyScalar(velocity + 0.5);

            // Partikel
            const worldPos = new THREE.Vector3();
            key.mesh.getWorldPosition(worldPos);
            createParticle(worldPos.x, worldPos.z, glowColor);

            // Animasi Tekan
            new TWEEN.Tween(key.mesh.position)
                .to({ y: key.originalY - 0.2 }, 80)
                .easing(TWEEN.Easing.Cubic.Out)
                .start();

            key.mesh.material.emissive.set(glowColor);

            // Animasi Kembali
            setTimeout(() => {
                new TWEEN.Tween(key.mesh.position)
                    .to({ y: key.originalY }, 200)
                    .easing(TWEEN.Easing.Quadratic.InOut)
                    .start();
                key.mesh.material.emissive.setHex(0x000000);
            }, duration * 1000);
        }

        // --- 6. MIDI HANDLERS ---
        const uploadInput = document.getElementById('midi-upload');
        const startBtn = document.getElementById('start-btn');
        let midiData = null;

        uploadInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                const arrayBuffer = await file.arrayBuffer();
                midiData = new Midi(arrayBuffer);
                document.getElementById('status').innerText = "Melodi siap!";
            }
        });

        startBtn.addEventListener('click', async () => {
            if (!midiData) return;
            await Tone.start();
            isPlaying = true;
            const now = Tone.now() + 0.5;

            midiData.tracks.forEach(track => {
                track.notes.forEach(note => {
                    sampler.triggerAttackRelease(note.name, note.duration, note.time + now, note.velocity);
                    Tone.Draw.schedule(() => {
                        animateKey(note.midi - 21, note.duration, note.velocity);
                    }, note.time + now);
                });
            });
        });

        // --- 7. CINEMATIC RENDER LOOP ---
        let angle = 0;
        function animate() {
            requestAnimationFrame(animate);
            TWEEN.update();
            
            if (isPlaying) {
                angle += 0.002;
                camera.position.x = Math.sin(angle) * 25;
                camera.position.z = Math.cos(angle) * 25;
                camera.lookAt(0, 0, 0);
            }

            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
