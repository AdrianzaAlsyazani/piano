<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Piano - Dreamy Ocean Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #ddeffb; }
        
        /* Slide UI */
        #ui-panel {
            position: absolute; top: 0; left: 0; bottom: 0;
            width: 280px; background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px); padding: 30px;
            box-shadow: 4px 0 30px rgba(0,0,0,0.05);
            transition: transform 0.6s cubic-bezier(0.77, 0, 0.175, 1);
            z-index: 100; border-right: 1px solid rgba(255,255,255,0.3);
        }
        #ui-panel.hidden { transform: translateX(-100%); }

        /* Toggle Button */
        #toggle-ui {
            position: absolute; top: 20px; left: 20px;
            background: #457b9d; color: white; border: none;
            padding: 10px 18px; border-radius: 8px; cursor: pointer;
            z-index: 101; font-weight: bold; transition: 0.3s;
        }
        #toggle-ui:hover { background: #1d3557; }

        .section { margin-bottom: 25px; }
        h3 { color: #1d3557; margin-bottom: 10px; font-weight: 300; border-bottom: 1px solid #a8dadc; }
        
        button.action {
            background: #a8dadc; border: none; padding: 12px;
            color: #1d3557; cursor: pointer; font-weight: bold; 
            border-radius: 8px; width: 100%; margin-top: 8px; transition: 0.3s;
        }
        button.action.active { background: #457b9d; color: white; }
        button.action:hover { background: #1d3557; color: white; }
        input[type="file"] { font-size: 0.75rem; color: #444; }
        #status { font-size: 0.8rem; margin-top: 10px; color: #457b9d; font-style: italic; }
    </style>
</head>
<body>

    <button id="toggle-ui">☰ Menu Studio</button>

    <div id="ui-panel">
        <h2 style="color:#457b9d; margin-top:50px;">Melody Ocean</h2>
        
        <div class="section">
            <h3>1. Unggah</h3>
            <input type="file" id="midi-upload" accept=".mid,.midi">
            <div id="status">Pilih melodi fajar...</div>
        </div>

        <div class="section">
            <h3>2. Kamera</h3>
            <button class="action active" onclick="setCamMode('free')" id="cam-free">Bebas</button>
            <button class="action" onclick="setCamMode('cinematic')" id="cam-cine">Sematik (Auto)</button>
            <button class="action" onclick="setCamMode('top')" id="cam-top">Atas (Synthesia)</button>
        </div>

        <div class="section">
            <button id="start-btn" style="background:#1d3557; color:white;" class="action">MAINKAN KONSER</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "tone": "https://esm.sh/tone",
                "@tonejs/midi": "https://esm.sh/@tonejs/midi",
                "@tweenjs/tween.js": "https://esm.sh/@tweenjs/tween.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import * as TWEEN from '@tweenjs/tween.js';
        import * as Tone from 'tone';
        import { Midi } from '@tonejs/midi';

        // --- 1. SETUP SCENE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xddeffb);
        scene.fog = new THREE.Fog(0xddeffb, 15, 60); // Kabut lembut fajar

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 25);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping; // Efek HDR lembut
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.HemisphereLight(0xffffff, 0x457b9d, 1.2));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5); dirLight.position.set(5,10,7); scene.add(dirLight);

        // --- 2. LANTAI OMBAK (Wave Floor) ---
        // Membuat lantai lingkaran besar dengan material air reflektif
        const floorGeo = new THREE.CircleGeometry(30, 64);
        const floorMat = new THREE.MeshStandardMaterial({ 
            color: 0x457b9d, // Warna air fajar
            roughness: 0.1, 
            metalness: 0.6, 
            transparent: true, 
            opacity: 0.5
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.6;
        scene.add(floor);

        // --- 3. SISTEM GELOMBANG (Wave Ripples) ---
        function createWave(x, z, color) {
            // Membuat cincin gelombang datar
            const waveGeo = new THREE.TorusGeometry(0.5, 0.05, 8, 32);
            const waveMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 1 });
            const wave = new THREE.Mesh(waveGeo, waveMat);
            wave.position.set(x, -0.58, z); // Sedikit di atas lantai
            wave.rotation.x = Math.PI / 2; // Datar di lantai
            scene.add(wave);

            // Animasi Gelombang Meluas dan Memudar
            new TWEEN.Tween(wave.scale)
                .to({ x: 8, y: 8, z: 1 }, 2500)
                .easing(TWEEN.Easing.Quadratic.Out)
                .onComplete(() => scene.remove(wave))
                .start();

            new TWEEN.Tween(waveMat).to({ opacity: 0 }, 2500).start();
        }

        // --- 4. PIANO (Fixed Spacing Logic) ---
        const keys = [];
        const keyGroup = new THREE.Group();
        const pattern = [false, true, false, true, false, false, true, false, true, false, true, false];
        let whiteCount = 0;
        const spacing = 0.52; // Jarak tuts akurat

        for (let i = 0; i < 88; i++) {
            const isBlack = pattern[i % 12];
            const mesh = new THREE.Mesh(
                isBlack ? new THREE.BoxGeometry(0.28, 0.45, 1.8) : new THREE.BoxGeometry(0.48, 0.35, 3.2),
                new THREE.MeshStandardMaterial({ color: isBlack ? 0x1d3557 : 0xffffff, emissive: new THREE.Color(0x000000) })
            );
            if (isBlack) mesh.position.set((whiteCount - 0.5) * spacing, 0.25, -0.75);
            else { mesh.position.set(whiteCount * spacing, 0, 0); whiteCount++; }
            keyGroup.add(mesh);
            keys.push({ mesh, originalY: mesh.position.y });
        }
        keyGroup.position.x = -(whiteCount * spacing) / 2;
        scene.add(keyGroup);

        // --- 5. UI PANEL & KAMERA LOGIC ---
        const panel = document.getElementById('ui-panel');
        document.getElementById('toggle-ui').onclick = () => panel.classList.toggle('hidden');

        window.camMode = 'free';
        window.setCamMode = (mode) => {
            window.camMode = mode;
            document.querySelectorAll('.action').forEach(b => b.classList.remove('active'));
            const id = 'cam-' + (mode === 'cinematic' ? 'cine' : mode);
            document.getElementById(id).classList.add('active');
            controls.enabled = (mode === 'free');
            if(mode === 'top') new TWEEN.Tween(camera.position).to({x:0, y:28, z:2}, 1000).start();
        };

        // --- 6. AUDIO & MIDI ---
        const sampler = new Tone.Sampler({
            urls: { "C4": "C4.mp3", "C5": "C5.mp3", "A0": "A0.mp3" },
            baseUrl: "https://tonejs.github.io/audio/salamander/",
        }).toDestination();

        let midi = null;
        document.getElementById('midi-upload').onchange = async (e) => {
            const buffer = await e.target.files[0].arrayBuffer();
            midi = new Midi(buffer);
            document.getElementById('status').innerText = "Melodi siap!";
        };

        document.getElementById('start-btn').onclick = async () => {
            if (!midi) return;
            await Tone.start();
            document.getElementById('status').innerText = "Konser dimulai...";
            const now = Tone.now() + 0.5;
            midi.tracks.forEach(track => track.notes.forEach(note => {
                sampler.triggerAttackRelease(note.name, note.duration, note.time + now, note.velocity);
                Tone.Draw.schedule(() => {
                    const keyIdx = note.midi - 21;
                    const key = keys[keyIdx];
                    if(!key) return;
                    
                    // Warna Glow Dinamis Berbasis Velocity
                    const col = new THREE.Color(0xa8dadc).multiplyScalar(note.velocity + 0.5);
                    const worldPos = new THREE.Vector3(); key.mesh.getWorldPosition(worldPos);
                    
                    // Memicu Gelombang di Permukaan Air
                    createWave(worldPos.x, worldPos.z, col);
                    
                    // Animasi Tuts Tekan
                    new TWEEN.Tween(key.mesh.position).to({y: key.originalY - 0.2}, 80).easing(TWEEN.Easing.Cubic.Out).start();
                    key.mesh.material.emissive.set(col);
                    
                    // Kembali
                    setTimeout(() => {
                        new TWEEN.Tween(key.mesh.position).to({y: key.originalY}, 200).start();
                        key.mesh.material.emissive.setHex(0x000000);
                    }, note.duration * 1000);
                }, note.time + now);
            }));
            panel.classList.add('hidden'); // Sembunyikan panel otomatis
        };

        // --- 7. ANIMATE LOOP ---
        let angle = 0;
        function animate() {
            requestAnimationFrame(animate);
            TWEEN.update(); // WAJIB untuk transisi animasi
            
            if(window.camMode === 'cinematic') {
                angle += 0.003;
                camera.position.x = Math.sin(angle) * 30;
                camera.position.z = Math.cos(angle) * 30;
                camera.position.y = 12 + Math.sin(angle * 0.5) * 4;
                camera.lookAt(0,0,0);
            }
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
