<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Piano - Soft Sky Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #4a4a4a;
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px);
            padding: 20px; border-radius: 15px; z-index: 10;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.3);
        }
        h2 { margin: 0 0 10px 0; font-weight: 300; letter-spacing: 1px; }
        button {
            background: #a8dadc; border: none; padding: 12px;
            color: #457b9d; cursor: pointer; font-weight: bold; 
            border-radius: 8px; width: 100%; transition: 0.3s;
        }
        button:hover { background: #457b9d; color: white; }
        input[type="file"] { margin-bottom: 15px; width: 100%; }
        #status { font-size: 0.8rem; margin-top: 10px; color: #777; }
    </style>
</head>
<body>

    <div id="ui">
        <h2>Heavenly Piano</h2>
        <input type="file" id="midi-upload" accept=".mid,.midi">
        <button id="start-btn">PLAY MELODY</button>
        <div id="status">Pilih melodi untuk memulai...</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "tone": "https://esm.sh/tone",
                "@tonejs/midi": "https://esm.sh/@tonejs/midi",
                "@tweenjs/tween.js": "https://esm.sh/@tweenjs/tween.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import * as TWEEN from '@tweenjs/tween.js';
        import * as Tone from 'tone';
        import { Midi } from '@tonejs/midi';

        // --- 1. SCENE DENGAN TEMA LANGIT LEMBUT ---
        const scene = new THREE.Scene();
        // Gradasi langit fajar (Soft Blue to Peach)
        scene.background = new THREE.Color(0xddeffb); 
        scene.fog = new THREE.Fog(0xddeffb, 10, 50);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- 2. LIGHTING (Soft & Airy) ---
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x8d99ae, 1);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // --- 3. LANTAI AWAN TRANSPLASENT ---
        const floorGeo = new THREE.CircleGeometry(20, 64);
        const floorMat = new THREE.MeshStandardMaterial({ 
            color: 0xffffff, 
            transparent: true, 
            opacity: 0.4, 
            roughness: 0
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.6;
        scene.add(floor);

        // --- 4. PEMBUATAN TUTS PIANO ---
        const keys = [];
        const keyGroup = new THREE.Group();
        const pattern = [false, true, false, true, false, false, true, false, true, false, true, false];
        
        let whiteKeyCount = 0;
        for (let i = 0; i < 88; i++) {
            const isBlack = pattern[i % 12];
            const geometry = isBlack ? new THREE.BoxGeometry(0.28, 0.4, 1.8) : new THREE.BoxGeometry(0.48, 0.3, 3);
            const material = new THREE.MeshStandardMaterial({ 
                color: isBlack ? 0x2b2d42 : 0xffffff,
                roughness: 0.1,
                metalness: 0.2
            });
            
            const mesh = new THREE.Mesh(geometry, material);
            
            if (isBlack) {
                mesh.position.set((whiteKeyCount - 0.5) * 0.52, 0.2, -0.6);
            } else {
                mesh.position.set(whiteKeyCount * 0.52, 0, 0);
                whiteKeyCount++;
            }
            
            keyGroup.add(mesh);
            keys.push({ mesh, isBlack, originalY: mesh.position.y });
        }
        keyGroup.position.x = -(whiteKeyCount * 0.52) / 2;
        scene.add(keyGroup);

        // --- 5. AUDIO SAMPLER ---
        const sampler = new Tone.Sampler({
            urls: { "C4": "C4.mp3", "A0": "A0.mp3", "A1": "A1.mp3" },
            baseUrl: "https://tonejs.github.io/audio/salamander/",
            release: 1.5
        }).toDestination();

        // --- 6. LOGIKA PERBAIKAN ANIMASI ---
        function animateKeyPress(idx, duration) {
            const key = keys[idx];
            if (!key) return;

            // Pastikan menghentikan animasi sebelumnya jika ada
            TWEEN.removeAll(); 

            // Gerakan Turun
            new TWEEN.Tween(key.mesh.position)
                .to({ y: key.originalY - 0.15 }, 80)
                .easing(TWEEN.Easing.Cubic.Out)
                .start();

            // Efek Warna saat ditekan
            key.mesh.material.emissive.setHex(0xa8dadc);

            // Gerakan Kembali
            setTimeout(() => {
                new TWEEN.Tween(key.mesh.position)
                    .to({ y: key.originalY }, 200)
                    .easing(TWEEN.Easing.Quadratic.InOut)
                    .start();
                key.mesh.material.emissive.setHex(0x000000);
            }, duration * 1000);
        }

        // --- 7. EVENT HANDLERS ---
        const uploadInput = document.getElementById('midi-upload');
        const startBtn = document.getElementById('start-btn');
        let midiData = null;

        uploadInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                const arrayBuffer = await file.arrayBuffer();
                midiData = new Midi(arrayBuffer);
                document.getElementById('status').innerText = "Melodi siap!";
            }
        });

        startBtn.addEventListener('click', async () => {
            if (!midiData) return;
            await Tone.start();
            const now = Tone.now() + 0.5;

            midiData.tracks.forEach(track => {
                track.notes.forEach(note => {
                    sampler.triggerAttackRelease(note.name, note.duration, note.time + now, note.velocity);
                    
                    Tone.Draw.schedule(() => {
                        animateKeyPress(note.midi - 21, note.duration);
                    }, note.time + now);
                });
            });
        });

        // --- 8. RENDER LOOP (PENTING: TWEEN.update() ditambahkan) ---
        function animate() {
            requestAnimationFrame(animate);
            
            // WAJIB: Ini yang membuat animasi bergerak
            TWEEN.update(); 
            
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
